<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Artículo de LAB Consultoría Gastronómica">
    <title>LAB Gastronomy Advisory | Artículo</title>
    <link rel="stylesheet" href="css/index.css">
    <!-- Marked.js para renderizar Markdown a HTML -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        .post-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 12rem 5% 5rem;
        }
        .post-cover-wrapper {
            width: 100%;
            height: 500px;
            overflow: hidden;
            margin-bottom: 4rem;
        }
        .post-cover {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .post-meta {
            font-family: var(--fuente-h3-h4);
            color: var(--color-naranja-primario);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin-bottom: 3rem;
            display: flex;
            gap: 1.5rem;
        }
        .post-content {
            font-family: var(--fuente-cuerpo);
        }
        .post-content h1 {
            font-family: var(--fuente-h1-h2);
            font-size: 3.5rem;
            line-height: 1.1;
            margin-bottom: 2rem;
            color: var(--color-texto-principal);
            font-weight: 400;
        }
        .post-content h2, .post-content h3 {
            font-family: var(--fuente-h3-h4);
            margin-top: 4rem;
            margin-bottom: 1.5rem;
            color: var(--color-texto-principal);
            font-weight: 600;
        }
        .post-content p {
            margin-bottom: 2rem;
            font-size: 1.15rem;
            color: var(--color-texto-secundario);
            line-height: 1.8;
            font-weight: 300;
        }
        .post-content ul, .post-content ol {
            margin-bottom: 2rem;
            padding-left: 2rem;
            color: var(--color-texto-secundario);
            font-size: 1.15rem;
            font-weight: 300;
        }
        .post-content li {
            margin-bottom: 0.8rem;
        }
        .post-content strong {
            font-weight: 700;
            color: var(--color-texto-principal);
        }
    </style>
</head>
<body>

    <header id="main-header"></header>

    <div class="post-container" id="post-container">
        <!-- Contenido renderizado por blog.js -->
        <div style="text-align: center; padding: 5rem 0;">
            <p style="font-family: var(--fuente-cuerpo); font-weight: 300;">Cargando artículo...</p>
        </div>
    </div>

    <!-- Secciones de Productos y Servicios (Inyectado por app.js) -->
    <div id="productos-secciones-globales"></div>

    <footer id="main-footer"></footer>

    <!-- GSAP & Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
    <script src="js/blog.js"></script>
</body>
</html>
