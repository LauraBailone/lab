<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Blog de LAB Consultoría Gastronómica. Artículos sobre rentabilidad, gestión y optimización de negocios gastronómicos.">
    <title>LAB Gastronomy Advisory | Blog</title>
    <link rel="stylesheet" href="css/index.css">
</head>
<body>

    <header id="main-header"></header>

    <!-- Hero Blog (Letras Gigantes, Sin Imagen ni Línea) -->
    <section class="hero-text-only" style="background-color: var(--color-fondo-general); padding: 14rem 5% 4rem; display: flex; justify-content: center; align-items: center; min-height: auto; width: 100%;">
        <div style="display: inline-flex; flex-direction: column; align-items: flex-end; position: relative; max-width: 100%;">
            <!-- Título Gigante Real de 11vw -->
            <h1 style="font-family: var(--fuente-h1-h2); font-size: 11vw; font-weight: 400; line-height: 0.9; color: var(--color-naranja-claro); text-transform: uppercase; margin: 0; letter-spacing: 0.1em; text-align: right;" class="gsap-fade-up">
                MI BLOG
            </h1>
            
            <!-- Firma al pie y a la derecha (tagline justo debajo del margen derecho inferior del titulo) -->
            <div style="margin-top: -0.8rem; padding-right: 0.5rem;" class="gsap-fade-up">
                <h3 style="font-family: var(--fuente-h3-h4); font-size: 1.1rem; font-weight: 600; color: var(--color-texto-secundario); letter-spacing: 0.15em; text-transform: uppercase; margin: 0;">
                    LAURA BAILONE
                </h3>
            </div>
        </div>
    </section>

    <!-- Artículos del Blog (Destacado y Grilla) -->
    <section class="blog-editorial">
        <!-- Bloque Destacado Principal (Renderizado por blog.js) -->
        <div id="blog-featured-container"></div>
        
        <!-- Resto de los artículos en Grilla de 3 Columnas (Renderizado por blog.js) -->
        <div class="blog-grid gsap-stagger-container" id="blog-grid-container" style="margin-top: 5rem;">
            <!-- Renderizado por blog.js -->
        </div>
    </section>

    <!-- Secciones de Productos y Servicios (Inyectado por app.js) -->
    <div id="productos-secciones-globales"></div>

    <footer id="main-footer"></footer>

    <!-- GSAP & Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
    <script src="js/blog.js"></script>
</body>
</html>
